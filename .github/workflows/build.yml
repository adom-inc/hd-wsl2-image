name: build-golden-image

# Builds the golden WSL2 rootfs, smoke-tests it, then publishes it two ways:
#   1. GitHub Release asset  — the flat .tar.gz that HD's WslDistroRuntime
#      downloads and feeds to `wsl --import` (primary distribution channel;
#      public repo → anonymous HTTPS download).
#   2. ghcr.io single-layer image — `docker import` of the same rootfs, so
#      the registry copy's one layer blob IS the rootfs (pullable without
#      docker via the OCI registry HTTP API if ever needed).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag / image version (e.g. v1)"
        required: true
        default: "v1"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # v18: REGISTRY-NATIVE — no private clones at all. No gallia (never invoked;
      # adom/core is the new gallia), no hd-skills snapshot (skills ship bundled
      # inside the bootstraps), no workspace-updater (RETIRED). The only staged
      # artifact is the adom-wiki CLI binary, fetched anonymously from the PUBLIC
      # registry's release assets (same mechanism the package's install.sh uses).
      - name: Stage the adom-wiki CLI into the build context
        run: |
          V=$(curl -fsSL https://wiki.adom.inc/api/v1/packages/adom-wiki-cli/manifest | jq -r .version)
          URL=$(curl -fsSL "https://wiki.adom.inc/api/packages/adom-wiki-cli/$V/assets" \
            | jq -r '[.assets[] | select(.platform=="linux" and (.arch=="x64" or .arch=="x86_64" or .arch=="amd64"))][0].download_url')
          test -n "$URL" && test "$URL" != "null" || { echo "no linux/x64 adom-wiki asset for $V"; exit 1; }
          case "$URL" in http*) ;; *) URL="https://wiki.adom.inc$URL";; esac
          curl -fsSL "$URL" -o image/adom-wiki
          chmod +x image/adom-wiki
          ./image/adom-wiki --version

      - name: Build image
        run: |
          docker build \
            --build-arg GOLDEN_VERSION="${{ inputs.version }}" \
            -t golden image/

      - name: Smoke test
        run: |
          docker run --rm golden bash -lc '
            set -e
            code-server --version
            node --version
            test -f /etc/wsl.conf
            test -x /etc/init-host-internal.sh
            test -x /opt/adom/bootstrap.sh
            test -f /var/lib/adom-bootstrap/phase-a-done
            cat /etc/adom-golden-version
            for b in adom-cli adom-vscode adom-mouser adom-digikey adom-jlcpcb adom-parts-search; do
              test -x /home/adom/.local/bin/$b || test -x /usr/local/bin/$b || { echo "MISSING $b"; exit 1; }
            done
            id adom | grep -q "uid=1001"
            # v18: registry-native — adom-wiki CLI replaces the deprecated adompkg
            test -x /home/adom/.local/bin/adom-wiki || { echo "MISSING adom-wiki CLI"; exit 1; }
            runuser -u adom -- /home/adom/.local/bin/adom-wiki --version >/dev/null || { echo "adom-wiki --version failed"; exit 1; }
            test ! -e /home/adom/.local/bin/adompkg || { echo "STALE adompkg present"; exit 1; }
            test -f /home/adom/project/adom_modules/.installed.json || { echo "MISSING adom_modules/.installed.json"; exit 1; }
            test -f /home/adom/.claude/skills/adom/SKILL.md
            # bundled-in-bootstrap skills (incl. hd-workspace-updater -> hd-staying-current rename)
            for s in hd-webview hd-pup hd-golden-image hd-staying-current hd-eda-discovery; do test -f /home/adom/.claude/skills/$s/SKILL.md || { echo "MISSING required HD skill: $s"; exit 1; }; done
            test ! -d /home/adom/.claude/skills/hd-workspace-updater || { echo "STALE hd-workspace-updater skill"; exit 1; }
            # v18: NO gallia at all (registry-native; adom/core is the new gallia)
            test ! -e /home/adom/gallia || { echo "gallia checkout present in registry-native image"; exit 1; }
            # retired packages must not be in the tree; tree must be sudo-free
            for p in adom-workspace-updater hd-skillpack; do test ! -d /home/adom/project/adom_modules/adom/$p || { echo "RETIRED package adom/$p present"; exit 1; }; done
            ! grep -rl "\"needs_sudo\": *true" /home/adom/project/adom_modules/*/*/package.json 2>/dev/null | grep -q . || { echo "needs_sudo package in tree"; exit 1; }
            jq -e "has(\"model\") | not" /home/adom/.claude/settings.json
            jq -e "[(.hooks.UserPromptSubmit // [])[] | (.hooks // [])[] | .command // \"\"] | any(contains(\"check-updates\")) | not" /home/adom/.claude/settings.json
            jq -e ".\"chat.agent.enabled\" == false" /home/adom/.local/share/code-server/User/settings.json
            jq -e ".\"extensions.autoUpdate\" == true and .\"extensions.autoCheckUpdates\" == true" /home/adom/.local/share/code-server/User/settings.json
            grep -q "disable-update-check: true" /home/adom/.config/code-server/config.yaml
            grep -qE "^[[:space:]]*systemd[[:space:]]*=[[:space:]]*true" /etc/wsl.conf
            test -x /usr/lib/systemd/systemd && test -e /sbin/init || { echo "MISSING systemd binary (PID 1 would fall back to /init, timer never fires)"; exit 1; }
            test ! -e /home/adom/project/.mcp.json
            test -z "$(find /home/adom ! -user adom -print -quit)" || { echo "OWNERSHIP leak under /home/adom:"; find /home/adom ! -user adom; exit 1; }
            # v18: workspace-updater RETIRED — must NOT exist (auto-update = adom/hook -> adom-wiki pkg update)
            test ! -e /usr/local/bin/adom-workspace-updater || { echo "RETIRED updater daemon present"; exit 1; }
            test ! -e /etc/systemd/system/adom-workspace-updater.timer || { echo "RETIRED updater timer present"; exit 1; }
            test -d /home/adom/project/adom_modules/adom/hook || { echo "MISSING adom/hook (the public auto-updater)"; exit 1; }
            # v10: adom user-session linger (else WSL CreateLoginSession times out → degraded)
            test -e /var/lib/systemd/linger/adom || { echo "MISSING adom linger"; exit 1; }
            # v10: pam_lastlog removed (slim base lacks the module → faulty-module log every login)
            ! grep -rslE "^[[:space:]]*session[[:space:]].*pam_lastlog\.so" /etc/pam.d/ >/dev/null || { echo "pam_lastlog.so still active in /etc/pam.d"; exit 1; }
            # v10: cron available + enabled for all distro users
            command -v cron >/dev/null && command -v crontab >/dev/null || { echo "MISSING cron/crontab"; exit 1; }
            test -L /etc/systemd/system/multi-user.target.wants/cron.service || { echo "cron.service not enabled"; exit 1; }
            echo "v10: linger + pam_lastlog-removed + cron enabled"
            echo SMOKE-OK
          '

      - name: Export flat rootfs
        run: |
          docker create --name exp golden
          docker export exp -o "adom-golden-${{ inputs.version }}.tar"
          docker rm exp
          gzip -9 "adom-golden-${{ inputs.version }}.tar"
          sha256sum "adom-golden-${{ inputs.version }}.tar.gz" \
            | tee "adom-golden-${{ inputs.version }}.tar.gz.sha256"
          ls -lh adom-golden-*

      - name: Push single-layer image to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker import "adom-golden-${{ inputs.version }}.tar.gz" \
            "ghcr.io/${{ github.repository }}:${{ inputs.version }}"
          docker tag "ghcr.io/${{ github.repository }}:${{ inputs.version }}" \
            "ghcr.io/${{ github.repository }}:latest"
          docker push "ghcr.io/${{ github.repository }}:${{ inputs.version }}"
          docker push "ghcr.io/${{ github.repository }}:latest"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            "adom-golden-${{ inputs.version }}.tar.gz" \
            "adom-golden-${{ inputs.version }}.tar.gz.sha256" \
            --title "Golden WSL2 rootfs ${{ inputs.version }}" \
            --notes "Flat rootfs for \`wsl --import\`. Ubuntu 24.04 + code-server + Adom CLIs baked. SHA256 in the .sha256 asset. Built by the build-golden-image workflow from this tag's Dockerfile." \
            || gh release upload "${{ inputs.version }}" \
                 "adom-golden-${{ inputs.version }}.tar.gz" \
                 "adom-golden-${{ inputs.version }}.tar.gz.sha256" --clobber
