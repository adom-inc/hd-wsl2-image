name: build-golden-image

# Builds the golden WSL2 rootfs, smoke-tests it, then publishes it two ways:
#   1. GitHub Release asset  — the flat .tar.gz that HD's WslDistroRuntime
#      downloads and feeds to `wsl --import` (primary distribution channel;
#      public repo → anonymous HTTPS download).
#   2. ghcr.io single-layer image — `docker import` of the same rootfs, so
#      the registry copy's one layer blob IS the rootfs (pullable without
#      docker via the OCI registry HTTP API if ever needed).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag / image version (e.g. v1)"
        required: true
        default: "v1"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Private repos — needs a token with read access to adom-inc/gallia
      # and adom-inc/hydrogen-desktop stored as the GALLIA_TOKEN repo
      # secret. .git is stripped: the public image must not carry the
      # private remotes or require auth.
      - name: Snapshot gallia + HD skills into build context
        env:
          GALLIA_TOKEN: ${{ secrets.GALLIA_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${GALLIA_TOKEN}@github.com/adom-inc/gallia.git" image/gallia
          rm -rf image/gallia/.git image/gallia/node_modules
          git clone --depth 1 --filter=blob:none --sparse \
            "https://x-access-token:${GALLIA_TOKEN}@github.com/adom-inc/hydrogen-desktop.git" /tmp/hd-checkout
          git -C /tmp/hd-checkout sparse-checkout set skills/public-facing src-tauri/crates/hd-app/resources/workspace-updater
          mkdir -p image/hd-skills
          cp -r /tmp/hd-checkout/skills/public-facing/shared /tmp/hd-checkout/skills/public-facing/wsl2 image/hd-skills/
          # workspace-updater daemon (HD auto-update Part B) — present only once
          # feature/hd-auto-update is merged to main; guarded so pre-merge builds work.
          # Dir ALWAYS exists (Dockerfile COPY needs a source); populated only
          # if the daemon is on main. bake-hd-setup.sh guards on the .sh file.
          mkdir -p image/workspace-updater
          UPD=/tmp/hd-checkout/src-tauri/crates/hd-app/resources/workspace-updater
          if [ -f "$UPD/adom-workspace-updater.sh" ]; then
            cp "$UPD/adom-workspace-updater.sh" "$UPD/adom-workspace-updater.service" "$UPD/adom-workspace-updater.timer" image/workspace-updater/
            echo "workspace-updater staged"
          else
            echo "workspace-updater absent on main (pre-merge) — daemon bake will skip"
          fi
          rm -rf /tmp/hd-checkout

      - name: Build image
        run: |
          docker build \
            --build-arg GOLDEN_VERSION="${{ inputs.version }}" \
            -t golden image/

      - name: Smoke test
        run: |
          docker run --rm golden bash -lc '
            set -e
            code-server --version
            node --version
            test -f /etc/wsl.conf
            test -x /etc/init-host-internal.sh
            test -x /opt/adom/bootstrap.sh
            test -f /var/lib/adom-bootstrap/phase-a-done
            cat /etc/adom-golden-version
            for b in adom-cli adom-vscode adom-mouser adom-digikey adom-jlcpcb adom-parts-search adom-gchat; do
              test -x /usr/local/bin/$b || { echo "MISSING $b"; exit 1; }
            done
            id adom | grep -q "uid=1001"
            test -x /home/adom/.local/bin/adompkg && test -f /home/adom/.local/bin/adompkg.mjs || { echo "MISSING adompkg"; exit 1; }
            runuser -u adom -- bash -lc "adompkg --version" >/dev/null || { echo "adompkg --version failed"; exit 1; }
            grep -q "ADOMPKG_REGISTRY=https://wiki.adom.inc" /etc/environment || { echo "MISSING ADOMPKG_REGISTRY pin"; exit 1; }
            test -f /home/adom/.claude/skills/adom/SKILL.md
            for s in hd-instapcb hd-eda-discovery; do test -f /home/adom/.claude/skills/$s/SKILL.md || { echo "MISSING required HD skill: $s"; exit 1; }; done
            test -d /home/adom/gallia
            test ! -e /home/adom/gallia/.git
            jq -e "has(\"model\") | not" /home/adom/.claude/settings.json
            jq -e "[(.hooks.UserPromptSubmit // [])[] | (.hooks // [])[] | .command // \"\"] | any(contains(\"check-updates\")) | not" /home/adom/.claude/settings.json
            jq -e ".\"chat.agent.enabled\" == false" /home/adom/.local/share/code-server/User/settings.json
            jq -e ".\"extensions.autoUpdate\" == true and .\"extensions.autoCheckUpdates\" == true" /home/adom/.local/share/code-server/User/settings.json
            grep -q "disable-update-check: true" /home/adom/.config/code-server/config.yaml
            grep -qE "^[[:space:]]*systemd[[:space:]]*=[[:space:]]*true" /etc/wsl.conf
            test -x /usr/lib/systemd/systemd && test -e /sbin/init || { echo "MISSING systemd binary (PID 1 would fall back to /init, timer never fires)"; exit 1; }
            test ! -e /home/adom/project/.mcp.json
            test -z "$(find /home/adom ! -user adom -print -quit)" || { echo "OWNERSHIP leak under /home/adom:"; find /home/adom ! -user adom; exit 1; }
            if [ -e /usr/local/bin/adom-workspace-updater ]; then
              test -x /usr/local/bin/adom-workspace-updater
              [ "$(/usr/local/bin/adom-workspace-updater --version)" = "adom-workspace-updater 0.1.6" ] || { echo "updater version mismatch"; exit 1; }
              test -L /etc/systemd/system/timers.target.wants/adom-workspace-updater.timer || { echo "updater timer not enabled"; exit 1; }
              ! grep -qi "^Persistent" /etc/systemd/system/adom-workspace-updater.timer || { echo "updater timer has Persistent= → fires at boot on fresh import"; exit 1; }
              echo "workspace-updater: baked + timer enabled (no Persistent)"
            else echo "workspace-updater: not baked (pre-merge)"; fi
            # v10: adom user-session linger (else WSL CreateLoginSession times out → degraded)
            test -e /var/lib/systemd/linger/adom || { echo "MISSING adom linger"; exit 1; }
            # v10: pam_lastlog removed (slim base lacks the module → faulty-module log every login)
            ! grep -rslE "^[[:space:]]*session[[:space:]].*pam_lastlog\.so" /etc/pam.d/ >/dev/null || { echo "pam_lastlog.so still active in /etc/pam.d"; exit 1; }
            # v10: cron available + enabled for all distro users
            command -v cron >/dev/null && command -v crontab >/dev/null || { echo "MISSING cron/crontab"; exit 1; }
            test -L /etc/systemd/system/multi-user.target.wants/cron.service || { echo "cron.service not enabled"; exit 1; }
            echo "v10: linger + pam_lastlog-removed + cron enabled"
            echo SMOKE-OK
          '

      - name: Export flat rootfs
        run: |
          docker create --name exp golden
          docker export exp -o "adom-golden-${{ inputs.version }}.tar"
          docker rm exp
          gzip -9 "adom-golden-${{ inputs.version }}.tar"
          sha256sum "adom-golden-${{ inputs.version }}.tar.gz" \
            | tee "adom-golden-${{ inputs.version }}.tar.gz.sha256"
          ls -lh adom-golden-*

      - name: Push single-layer image to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker import "adom-golden-${{ inputs.version }}.tar.gz" \
            "ghcr.io/${{ github.repository }}:${{ inputs.version }}"
          docker tag "ghcr.io/${{ github.repository }}:${{ inputs.version }}" \
            "ghcr.io/${{ github.repository }}:latest"
          docker push "ghcr.io/${{ github.repository }}:${{ inputs.version }}"
          docker push "ghcr.io/${{ github.repository }}:latest"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            "adom-golden-${{ inputs.version }}.tar.gz" \
            "adom-golden-${{ inputs.version }}.tar.gz.sha256" \
            --title "Golden WSL2 rootfs ${{ inputs.version }}" \
            --notes "Flat rootfs for \`wsl --import\`. Ubuntu 24.04 + code-server + Adom CLIs baked. SHA256 in the .sha256 asset. Built by the build-golden-image workflow from this tag's Dockerfile." \
            || gh release upload "${{ inputs.version }}" \
                 "adom-golden-${{ inputs.version }}.tar.gz" \
                 "adom-golden-${{ inputs.version }}.tar.gz.sha256" --clobber
