[boot]
# Enable systemd inside the distro so services (and anything else that
# expects PID 1 to be systemd) work. Available in WSL 0.67.6+.
systemd=true

[user]
# The golden rootfs bakes the `adom` user (uid 1001, passwordless sudo),
# so unlike the thin tarball we can default to it directly.
default=adom

[network]
generateHosts=true
generateResolvConf=true

[interop]
enabled=true
appendWindowsPath=false
